<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lalit || weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #0a0f1e;
    --c2: #111827;
    --c3: #1e2a45;
    --accent: #60a5fa;
    --accent2: #fbbf24;
    --text: #f0f4ff;
    --muted: #8899bb;
    --border: rgba(96,165,250,0.15);
    --radius: 20px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--c1);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Animated star/noise background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(96,165,250,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(251,191,36,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 24px 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand span { color: var(--accent); }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 28px;
  }
  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    stroke: var(--muted);
    fill: none;
    pointer-events: none;
  }
  #city-input {
    width: 100%;
    background: var(--c3);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 56px 14px 46px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  #city-input::placeholder { color: var(--muted); }
  #city-input:focus { border-color: var(--accent); }
  #search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #0a0f1e;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #search-btn:hover { opacity: 0.85; }



  /* Main card */
  .weather-card {
    background: var(--c2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 16px;
    display: none;
    animation: fadeUp 0.4s ease;
  }
  .weather-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .city-name {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .country { color: var(--accent); }

  .temp-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin: 12px 0 20px;
  }
  .temp-main {
    font-family: 'DM Serif Display', serif;
    font-size: 80px;
    line-height: 1;
    letter-spacing: -3px;
  }
  .temp-unit { font-size: 32px; color: var(--muted); }
  .weather-icon-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .weather-icon-wrap img { width: 72px; height: 72px; filter: drop-shadow(0 0 12px rgba(96,165,250,0.3)); }
  .condition {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    text-transform: capitalize;
  }

  .desc-line {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 24px;
    text-transform: capitalize;
  }

  /* Stats grid */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--c3);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
  }
  .stat-unit { font-size: 11px; color: var(--muted); }

  /* Feel & visibility row */
  .extra-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .extra-item {
    background: var(--c3);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .extra-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: rgba(96,165,250,0.1);
  }
  .extra-text { }
  .extra-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .extra-val { font-size: 16px; font-weight: 500; margin-top: 2px; }

  /* Sunrise/sunset */
  .sun-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .sun-item {
    background: linear-gradient(135deg, rgba(251,191,36,0.08), rgba(251,191,36,0.03));
    border: 1px solid rgba(251,191,36,0.15);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sun-icon { font-size: 22px; }
  .sun-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .sun-val { font-size: 16px; font-weight: 500; color: var(--accent2); margin-top: 2px; }

  /* Updated time */
  .updated {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  /* Error */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    color: #f87171;
    display: none;
    margin-bottom: 16px;
  }
  .error-msg.visible { display: block; }

  /* Loader */
  .loader {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }
  .loader.visible { display: block; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Placeholder */
  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
  }
  .placeholder-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .placeholder h2 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 8px; }
  .placeholder p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <span>⛅</span>Weather<span>Detection</span>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="city-input" placeholder="Search city…" autocomplete="off" onkeydown="if(event.key==='Enter')fetchWeather()">
    <button id="search-btn" onclick="fetchWeather()">Search</button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    Fetching weather…
  </div>

  <!-- Weather card -->
  <div class="weather-card" id="weather-card">
    <div class="city-name" id="city-name"></div>

    <div class="temp-row">
      <div>
        <div style="display:flex;align-items:flex-start;gap:4px">
          <div class="temp-main" id="temp"></div>
          <div class="temp-unit">°C</div>
        </div>
        <div class="desc-line" id="desc"></div>
      </div>
      <div class="weather-icon-wrap">
        <img id="w-icon" src="" alt="">
        <div class="condition" id="condition"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity"></div>
        <div class="stat-unit">%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="wind"></div>
        <div class="stat-unit">km/h</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="pressure"></div>
        <div class="stat-unit">hPa</div>
      </div>
    </div>

    <div class="extra-row">
      <div class="extra-item">
        <div class="extra-icon">🌡️</div>
        <div class="extra-text">
          <div class="extra-label">Feels like</div>
          <div class="extra-val" id="feels"></div>
        </div>
      </div>
      <div class="extra-item">
        <div class="extra-icon">👁️</div>
        <div class="extra-text">
          <div class="extra-label">Visibility</div>
          <div class="extra-val" id="visibility"></div>
        </div>
      </div>
    </div>

    <div class="sun-row">
      <div class="sun-item">
        <div class="sun-icon">🌅</div>
        <div>
          <div class="sun-label">Sunrise</div>
          <div class="sun-val" id="sunrise"></div>
        </div>
      </div>
      <div class="sun-item">
        <div class="sun-icon">🌇</div>
        <div>
          <div class="sun-label">Sunset</div>
          <div class="sun-val" id="sunset"></div>
        </div>
      </div>
    </div>

    <div class="updated" id="updated"></div>
  </div>


  <div class="placeholder" id="placeholder">
    <div class="placeholder-icon">🌤️</div>
    <h2>Check the weather</h2>
    <p>Search for any city to get started.</p>
  </div>
</div>

<script>
  const API_KEY = '51fcd4d3ec39eeec4ed3b65a86f51f25';

  function fmt(unix, tz) {
    const d = new Date((unix + tz) * 1000);
    const h = d.getUTCHours().toString().padStart(2,'0');
    const m = d.getUTCMinutes().toString().padStart(2,'0');
    return `${h}:${m}`;
  }

  async function fetchWeather() {
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;
    if (!API_KEY) { showError('Please enter your OpenWeatherMap API key first.'); return; }

    showLoader(true);
    showError('');
    hide('weather-card');
    hide('placeholder');

    try {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
      );
      const data = await res.json();

      if (data.cod !== 200) {
        showError(data.message || 'City not found. Try another name.');
        show('placeholder');
        return;
      }

      render(data);
    } catch(e) {
      showError('Network error. Check your connection and try again.');
      show('placeholder');
    } finally {
      showLoader(false);
    }
  }

  function render(d) {
    document.getElementById('city-name').innerHTML =
      `${d.name}, <span class="country">${d.sys.country}</span>`;
    document.getElementById('temp').textContent = Math.round(d.main.temp);
    document.getElementById('desc').textContent = d.weather[0].description;
    document.getElementById('condition').textContent = d.weather[0].main;
    document.getElementById('w-icon').src =
      `https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
    document.getElementById('humidity').textContent = d.main.humidity;
    document.getElementById('wind').textContent = Math.round(d.wind.speed * 3.6);
    document.getElementById('pressure').textContent = d.main.pressure;
    document.getElementById('feels').textContent = `${Math.round(d.main.feels_like)}°C`;
    document.getElementById('visibility').textContent =
      d.visibility >= 1000 ? `${(d.visibility/1000).toFixed(1)} km` : `${d.visibility} m`;
    document.getElementById('sunrise').textContent = fmt(d.sys.sunrise, d.timezone);
    document.getElementById('sunset').textContent  = fmt(d.sys.sunset,  d.timezone);
    document.getElementById('updated').textContent =
      `Updated at ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;

    show('weather-card');
    document.getElementById('weather-card').classList.add('visible');
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    if (msg) { el.textContent = msg; el.classList.add('visible'); }
    else { el.textContent = ''; el.classList.remove('visible'); }
  }
  function showLoader(on) {
    document.getElementById('loader').classList.toggle('visible', on);
  }
  function show(id) { document.getElementById(id).style.display = ''; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }


</script>
</body>
</html>
